esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false

logger:

api:
  homeassistant_services: true

ota:
  - platform: esphome

http_request:
  useragent: esphome/${friendly_name}
  timeout: 10s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password